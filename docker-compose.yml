version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-crm-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-crm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crm_password}
      POSTGRES_DB: ${DB_NAME:-mini_crm}
      TZ: UTC
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-crm_user}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mini-crm-network

volumes:
  postgres_data:

networks:
  mini-crm-network:
    driver: bridge
